<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SDIYBT</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #080808;
    color: white;
    min-height: 100vh;
    margin: 0;
    padding: 15px;

    display: grid;
    grid-template-columns: 250px 1fr 250px;
    grid-template-rows: 70px 1fr;
    gap: 15px;

    box-sizing: border-box;
}

nav {
    grid-column: 1 / 4;
    grid-row: 1;

    background: linear-gradient(90deg, #151515, #252525, #151515);
    border: 1px solid #444;
    border-radius: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    box-shadow: 0 0 20px #000;
}

nav button {
    background: #202020;
    color: white;
    border: 1px solid #666;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: .25s;
}

nav button:hover {
    background: #444;
    transform: translateY(-2px);
}

.stats {
    background: linear-gradient(180deg, #141414, #222, #141414);
    border: 1px solid #444;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 0 20px #000;
    grid-column: 1;
    grid-row: 2;
}

.stats h2 {
    margin-bottom: 20px;
    text-align: center;
}

.info {
    background: linear-gradient(180deg, #141414, #222, #141414);
    border: 1px solid #444;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 0 20px #000;
    grid-column: 3;
    grid-row: 2;
}

.info h2 {
    text-align: center;
    margin-bottom: 20px;
}

.stat-box {
    background: #333;
    border: 1px solid #777;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

.main {
    background: linear-gradient(145deg, #1b1b1b, #101010);
    border: 1px solid #333;
    border-radius: 15px;
    box-shadow: inset 0 0 40px #000;

    display: grid;
    grid-template-rows: 1fr 85px;
    overflow: hidden;
    grid-column: 2;
    grid-row: 2;
}

.game-view {
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 40px;
    color: #ddd;
}

.upgrades {
    border-top: 1px solid #333;
    background: #151515;
    padding: 15px;

    display: flex;
    gap: 10px;
    overflow-x: auto;
}

.upgrade {
    min-width: 100px;
    background: #222;
    border: 1px solid #555;
    border-radius: 10px;
    padding: 15px;
    transition: .2s;
    text-align: center;
}

.upgrade:hover {
    background: #2f2f2f;
    transform: translateY(-2px);
}

#arena {
    width: 500px;
    height: 500px;
    aspect-ratio: 1 / 1;
    border: 3px solid #555;
    border-radius: 50%;
    position: relative;
    overflow: hidden;
}

#player {
    width: 30px;
    height: 30px;
    background: white;
    border-radius: 50%;
    position: absolute;
    left: 235px;
    top: 235px;
}
.item {
    width: 12px;
    height: 12px;
    background: #aaa;
    border-radius: 50%;
    position: absolute;
}
</style>

</head>

<body>

<nav>
    <button>Home</button>
    <button>req lvl 30</button>
</nav>

<div class="stats">
    <h2>Stats</h2>

    <div class="stat-box" id="poop">
        Poop: 0
    </div>
    <div class="stat-box" id="level">
        Level: 0
    </div>
</div>

<div class="main">

    <div class="game-view">
        <div id="arena">
            <div id="player"></div>
        </div>
    </div>

    <div class="upgrades">
        <div class="upgrade" id="pPoopMulti">
            <h3>Poop Multi</h3>
        </div>
        <div class="upgrade" id="pXpMulti">
            <h3>Xp Multi</h3>
        </div>
        <div class="upgrade" id="pCap">
            <h3>Poop Cap</h3>
        </div>
        <div class="upgrade" id="pSpawnSpeed">
            <h3>Poop Spawn Speed</h3>
        </div>
    </div>

</div>

<div class="info" id="info">
    <h2>Information</h2>

    <p>Example</p>
    <br>
</div>

<script>
//********************************************************************************
//********************************************************************************
//*********************************** VARiABLES
//********************************************************************************
//********************************************************************************


let poop = Number(localStorage.getItem("poop")) ?? 0;
let level = Number(localStorage.getItem("level")) ?? 0;
let xp = Number(localStorage.getItem("xp")) ?? 0;
let xpreq = 100 * 1.1**level;
let poopMulti = 1;


//********************************************************************************
//*********************************** UPGRADE VARiABLES
//********************************************************************************


let upgradesInfo = {
    pPoopMulti: {
        name: "Poop Multiplier",
        level: Number(localStorage.getItem("pPoopMulti.Level")) ?? 0,
        cost() {
            return Math.floor((2.5 + Math.floor(this.level/10)/2) ** this.level);
        },
        multi() {
            return Math.floor(2 ** this.level);
        }
    },
    pXpMulti: {
        name: "Xp Multiplier",
        level: Number(localStorage.getItem("pXpMulti.Level")) ?? 0,
        cost() {
            return Math.floor(10 * 1.5 ** this.level);
        },
        multi() {
            return Math.floor(10 * 1.5 ** this.level);
        }
    },
    pCap: {
        name: "Poop Cap",
        level: Number(localStorage.getItem("pCap.Level")) ?? 0,
        cost() {
            return Math.floor(10 * 1.5 ** this.level);
        },
        multi() {
            return Math.floor(10 * 1.5 ** this.level);
        }
    },
    pSpawnSpeed: {
        name: "Poop Spawn Speed",
        level: Number(localStorage.getItem("pSpawnSpeed.Level")) ?? 0,
        cost() {
            return Math.floor(10 * 1.5 ** this.level);
        },
        multi() {
            return Math.floor(10 * 1.5 ** this.level);
        }
    }
};


//********************************************************************************
//*********************************** CALCULATE VARiABLES
//********************************************************************************





//********************************************************************************
//*********************************** HTML VARiABLES
//********************************************************************************


const info = document.getElementById("info");


//********************************************************************************
//*********************************** VARIABLE FUNCTIONS
//********************************************************************************


function poopCollect(amount = 1) {
    poop += amount * poopMulti;
    document.getElementById("poop").innerText = "Poop: " + formatNumber(poop);
    localStorage.setItem("poop", poop);
}

function calculatePoopMulti() {
    poopMulti = upgradesInfo.pPoopMulti.multi();
}

function xpCollect() {
    xp++;
}


//********************************************************************************
//********************************************************************************
//*********************************** FUNCTIONS
//********************************************************************************
//********************************************************************************


function formatNumber(number) {
    if (number < 1) return number;
    const eNotation = Math.log10(number);
    const suffix = ["K", "M", "B", "T", "Qd", "Qn", "Sx", "Sp", "Oc", "No"];

    if (eNotation < 3) return number;
    else if (eNotation < 33) return String(number / (1000 ** Math.floor(eNotation / 3))).slice(0, 5) + suffix[Math.floor(eNotation / 3) - 1];
    else if (eNotation > 33) return (10 ** (Math.floor(eNotation) - eNotation)) + "e" + Math.floor(eNotation);
}

function infoBox(id) {
    //info.innerHTML = `<h2>Information</h2><h3>${upgradesInfo[id].name}</h3>Level: ${upgradesInfo[id].level}<br>Cost: ${upgradesInfo[id].cost()}<br>Multi: ${upgradesInfo[id].multi()}`;
    info.innerHTML = "test";
}

function upgradeClicked(id) {
    cost = upgradesInfo[id].cost();
    if (poop < cost) return;
    poop -= cost;
    upgradesInfo[id].level++;
    calculatePoopMulti();
    infoBox(id);
}


//********************************************************************************
//********************************************************************************
//*********************************** EVENT LISTENERS
//********************************************************************************
//********************************************************************************

function eventListenerUpgrades () {
    const upgrades = document.querySelectorAll(".upgrade");
    
    upgrades.forEach(upgrade => {
        upgrade.addEventListener("mouseenter", () => {
            infoBox(upgrade.id);
        });
        upgrade.addEventListener("click", () => {
            upgradeClicked(upgrade.id);
        });
    });
}
eventListenerUpgrades();

const stats = document.querySelectorAll(".stat-box");

stats.forEach(upgrade => {
    upgrade.addEventListener("mouseenter", () => {
        infoBox(upgrade.id);
    });
});


//********************************************************************************
//********************************************************************************
//*********************************** ARENA STUFF
//********************************************************************************
//********************************************************************************


const arena = document.getElementById("arena");
const player = document.getElementById("player");

let speed = 1.5;
let playerRadius = 15;
let cap = 5;
let currentItems = 0;

// Player starts in center
let playerX = arena.offsetWidth / 2;
let playerY = arena.offsetHeight / 2;

let keys = {};
let items = [];

// Keyboard input
document.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

// Spawn items inside the circle
function spawnItem() {
    if (currentItems == cap) return;

    const arenaRadius = arena.offsetWidth / 2;
    const centerX = arena.offsetWidth / 2;
    const centerY = arena.offsetHeight / 2;

    let angle = Math.random() * Math.PI * 2;
    let distance = Math.random() * (arenaRadius - 10);

    let x = centerX + Math.cos(angle) * distance;
    let y = centerY + Math.sin(angle) * distance;

    let item = document.createElement("div");
    item.className = "item";

    item.style.left = (x - 6) + "px";
    item.style.top = (y - 6) + "px";

    arena.appendChild(item);

    items.push({
        element: item,
        x: x,
        y: y,
        radius: 6
    });

    currentItems++;
}

setInterval(spawnItem, 1000);


// Main game loop
function update() {

    // Movement
    if (keys["w"] || keys["arrowup"]) {
        playerY -= speed;
    }
    if (keys["s"] || keys["arrowdown"]) {
        playerY += speed;
    }
    if (keys["a"] || keys["arrowleft"]) {
        playerX -= speed;
    }
    if (keys["d"] || keys["arrowright"]) {
        playerX += speed;
    }


    // Keep player inside arena
    const centerX = arena.clientWidth / 2;
    const centerY = arena.clientHeight / 2;
    const arenaRadius = arena.clientWidth / 2;

    let dx = playerX - centerX;
    let dy = playerY - centerY;

    let distance = Math.hypot(dx, dy);

    let maxDistance = arenaRadius - playerRadius;

    if (distance > maxDistance) {
        let angle = Math.atan2(dy, dx);

        playerX = centerX + Math.cos(angle) * maxDistance;
        playerY = centerY + Math.sin(angle) * maxDistance;
    }


    // Draw player
    player.style.left = (playerX - playerRadius) + "px";
    player.style.top = (playerY - playerRadius) + "px";


    // Collect items
    for (let i = items.length - 1; i >= 0; i--) {
        let item = items[i];

        let dx = playerX - item.x;
        let dy = playerY - item.y;

        let distance = Math.hypot(dx, dy);

        if (distance < playerRadius + item.radius) {
            item.element.remove();
            items.splice(i, 1);
            currentItems--;
            poopCollect();
            xpCollect();
        }
    }

    requestAnimationFrame(update);
}

// Start game
update();


//********************************************************************************
//********************************************************************************
//*********************************** CALCULATE VARIABLES
//********************************************************************************
//********************************************************************************


calculatePoopMulti();


</script>
</body>
</html>
